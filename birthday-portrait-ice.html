<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Bursdag TV</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  cursor: none;
}

body {
  color: #ffffff;
}

#page {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
  background: #000;
}

#birthdayView,
#adView,
#errorView {
  width: 100%;
  height: 100%;
  display: none;
  box-sizing: border-box;
  padding-bottom: 24vh;
}

#birthdayView.active,
#adView.active,
#errorView.active {
  display: flex;
}

/* BURSDAGSVISNING */
#birthdayView {
  position: relative;
  flex-direction: column;
  overflow: hidden;
  background: #000;
}

#birthdayBg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: fill;
  object-position: center center;
  z-index: 1;
}

#names {
  position: absolute;
  left: 6vw;
  right: 6vw;
  top: 27%;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  text-align: center;
}

.nameCard {
  width: 100%;
  min-height: 8.4vh;
  box-sizing: border-box;
  padding: 1.1vh 3vw;
  border-radius: 3.0vh;
  margin-bottom: 1.8vh;

  background: rgba(255, 255, 255, 0.18);
  border: 0.22vh solid rgba(255, 255, 255, 0.42);
  box-shadow:
    0 1.0vh 2.4vh rgba(0,0,0,0.28),
    inset 0 0.12vh 0 rgba(255,255,255,0.35),
    inset 0 -0.12vh 0 rgba(255,255,255,0.10);

  backdrop-filter: blur(10px) saturate(135%);
  -webkit-backdrop-filter: blur(10px) saturate(135%);

  display: flex;
  align-items: center;
  justify-content: center;
}

.nameCard:last-child {
  margin-bottom: 0;
}

.nameText {
  font-size: 8.85vh;
  line-height: 0.95;
  font-weight: 900;
  color: #ffffff;
  text-shadow:
    0.16vh 0.16vh 0 #000,
    -0.16vh 0.16vh 0 #000,
    0.16vh -0.16vh 0 #000,
    -0.16vh -0.16vh 0 #000,
    0 0.7vh 1.3vh rgba(0,0,0,0.72);
  white-space: normal;
  overflow-wrap: anywhere;
}

/* Flere bursdager */
.namesMany {
  top: 25% !important;
}

.namesMany .nameCard {
  min-height: 7.5vh;
  border-radius: 2.6vh;
  padding: 0.9vh 2.4vw;
  margin-bottom: 1.4vh;
}

.namesMany .nameText {
  font-size: 6.9vh;
}

/* Mange bursdager */
.namesLots {
  top: 22% !important;
}

.namesLots .nameCard {
  min-height: 6.2vh;
  border-radius: 2.2vh;
  padding: 0.7vh 2.2vw;
  margin-bottom: 1.0vh;
}

.namesLots .nameText {
  font-size: 5.4vh;
}

/* REKLAMEVISNING */
#adView {
  position: relative;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background:
    radial-gradient(circle at top left, rgba(246,62,160,0.45), transparent 35%),
    radial-gradient(circle at bottom right, rgba(78,144,223,0.40), transparent 38%),
    linear-gradient(to bottom, #17232e, #1d2a37, #17232e);
  padding-left: 4vw;
  padding-right: 4vw;
}

#adBrand {
  position: absolute;
  top: 3vh;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 4.8vh;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

#adBox {
  width: 88%;
  border-radius: 3vh;
  padding: 4vh 3vw;
  background: rgba(255,255,255,0.12);
  border: 0.25vh solid rgba(255,255,255,0.22);
  box-shadow: 0 1.2vh 3vh rgba(0,0,0,0.22);
}

#adHeadline {
  font-size: 7.2vh;
  line-height: 0.95;
  font-weight: 900;
  text-transform: uppercase;
  text-shadow: 0 0.8vh 1.8vh rgba(0,0,0,0.35);
}

#adText {
  margin-top: 3vh;
  font-size: 4.2vh;
  line-height: 1.08;
  font-weight: 900;
  color: rgba(255,255,255,0.92);
}

#adBottom {
  position: absolute;
  bottom: 25vh;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 5.4vh;
  font-weight: 900;
}

/* FEILVISNING */
#errorView {
  align-items: center;
  justify-content: center;
  text-align: center;
  flex-direction: column;
  gap: 3vh;
  background: #17232e;
  padding-left: 4vw;
  padding-right: 4vw;
}

#errorTitle {
  font-size: 5.8vh;
  font-weight: 900;
}

#errorText {
  font-size: 3.2vh;
  font-weight: 800;
  max-width: 90%;
  color: rgba(255,255,255,0.82);
}

/* FAST ISSTRIPE - VISES HELE TIDEN */
#iceBar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 24vh;
  z-index: 50;
  pointer-events: none;

  background-image: url('icebar-diplomis-v23.png');
  background-repeat: no-repeat;
  background-position: bottom center;
  background-size: 100% auto;
}
</style>
</head>

<body>
<div id="page">

  <section id="birthdayView">
    <img id="birthdayBg" src="birthday-bg.png" alt="Gratulerer med dagen">
    <div id="names"></div>
  </section>

  <section id="adView">
    <div id="adBrand">RUSH HAUGESUND</div>
    <div id="adBox">
      <div id="adHeadline">BOOK BURSDAG<br>HOS RUSH</div>
      <div id="adText">Feir dagen med hopping, pizza og eget bursdagsrom</div>
    </div>
    <div id="adBottom">00:00</div>
  </section>

  <section id="errorView">
    <div id="errorTitle">BURSDAGSSKJERM</div>
    <div id="errorText">Mangler kobling til bursdagsdata. Legg inn Apps Script-lenken i DATA_URL.</div>
  </section>

  <div id="iceBar"></div>

</div>

<script>
/*
  SETT INN WEB APP-LENKEN FRA GOOGLE APPS SCRIPT HER NÅR DEN ER KLAR.
  Eksempel:
  var DATA_URL = "https://script.google.com/macros/s/AKfycbxxxxxxx/exec";
*/
var DATA_URL = "";

/*
  true = viser testnavn hele tiden.
  false = henter navn fra DATA_URL. Hvis ingen bursdager, vises reklame.
*/
var FORCE_SHOW_TEST_BIRTHDAYS = true;

/*
  Testdata. Brukes bare når FORCE_SHOW_TEST_BIRTHDAYS = true
  eller når DATA_URL er tom.
*/
var TEST_DATA = [
  { name: "Sigrid 10 år" },
  { name: "Loke og Magnus 6 år" }
];

var birthdayData = [];
var adIndex = 0;

var ads = [
  {
    headline: "BOOK BURSDAG\nHOS RUSH",
    text: "Feir dagen med hopping, pizza og eget bursdagsrom"
  },
  {
    headline: "MINISPRETT",
    text: "For de minste hopperne lørdag og søndag"
  },
  {
    headline: "RUSH AFTER DARK",
    text: "Lys, musikk og ekstra stemning i parken"
  },
  {
    headline: "KAFÉEN ER ÅPEN",
    text: "Slush, pizza, snacks og drikke finner du i kaféen"
  }
];

function pad(n) {
  return (n < 10 ? "0" : "") + n;
}

function formatClock(d) {
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function normalizeName(name) {
  return String(name || "").trim();
}

function formatBirthdayName(name) {
  var clean = normalizeName(name);
  if (!clean) return "";

  var parts = clean.split(",").map(function(part) {
    return part.trim();
  }).filter(function(part) {
    return part.length > 0;
  });

  if (parts.length <= 1) return clean;
  if (parts.length === 2) return parts[0] + " og " + parts[1];

  return parts.slice(0, -1).join(", ") + " og " + parts[parts.length - 1];
}

function getBirthdaysToShow() {
  var source = birthdayData;

  if (FORCE_SHOW_TEST_BIRTHDAYS || !DATA_URL) {
    source = TEST_DATA;
  }

  var active = [];

  for (var i = 0; i < source.length; i++) {
    var item = source[i];
    var rawName = "";

    if (typeof item === "string") {
      rawName = item;
    } else if (item && item.name) {
      rawName = item.name;
    } else if (item && item.names) {
      rawName = item.names;
    }

    var name = formatBirthdayName(rawName);
    if (!name) continue;

    active.push(name);
  }

  return active;
}

function setActive(viewId) {
  document.getElementById("birthdayView").className = "";
  document.getElementById("adView").className = "";
  document.getElementById("errorView").className = "";
  document.getElementById(viewId).className = "active";
}

function renderBirthdays(names) {
  setActive("birthdayView");

  var container = document.getElementById("names");

  if (names.length >= 5) {
    container.className = "namesLots";
  } else if (names.length > 1) {
    container.className = "namesMany";
  } else {
    container.className = "";
  }

  var html = "";
  for (var i = 0; i < names.length; i++) {
    html += ''
      + '<div class="nameCard">'
      +   '<div class="nameText">' + escapeHtml(names[i]) + '</div>'
      + '</div>';
  }

  container.innerHTML = html;
}

function renderAd() {
  setActive("adView");

  var ad = ads[adIndex % ads.length];
  document.getElementById("adHeadline").innerHTML =
    escapeHtml(ad.headline).replace(/\n/g, "<br>");
  document.getElementById("adText").innerHTML = escapeHtml(ad.text);
}

function renderError(message) {
  setActive("errorView");

  if (message) {
    document.getElementById("errorText").innerHTML = escapeHtml(message);
  }
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function tick() {
  var now = new Date();
  document.getElementById("adBottom").innerHTML = formatClock(now);

  var names = getBirthdaysToShow();

  if (names.length > 0) {
    renderBirthdays(names);
  } else {
    renderAd();
  }
}

function loadDataJsonp() {
  if (!DATA_URL) {
    birthdayData = TEST_DATA;
    tick();
    return;
  }

  var old = document.getElementById("birthdayDataScript");
  if (old) old.remove();

  var script = document.createElement("script");
  script.id = "birthdayDataScript";
  script.src = DATA_URL + "?callback=receiveBirthdayData&v=" + Date.now();

  script.onerror = function() {
    renderError("Klarte ikke å hente bursdagsdata.");
  };

  document.body.appendChild(script);
}

function receiveBirthdayData(data) {
  if (data && data.birthdays && Array.isArray(data.birthdays)) {
    birthdayData = data.birthdays;
  } else if (Array.isArray(data)) {
    birthdayData = data;
  } else {
    birthdayData = [];
  }

  tick();
}

loadDataJsonp();

setInterval(tick, 1000);
setInterval(loadDataJsonp, 60000);

setInterval(function() {
  adIndex++;
}, 12000);
</script>
</body>
</html>
