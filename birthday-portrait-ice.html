<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Bursdag TV med Isstripe</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  cursor: none;
}

body {
  color: #ffffff;
}

#page {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
  background: #000;
}

#birthdayView,
#adView,
#errorView {
  width: 100%;
  height: 100%;
  display: none;
}

#birthdayView.active,
#adView.active,
#errorView.active {
  display: flex;
}

#birthdayView {
  position: relative;
  flex-direction: column;
  overflow: hidden;
  background: #000;
}

#birthdayBg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: fill;
  object-position: center center;
  z-index: 1;
}

#names {
  position: absolute;
  left: 6vw;
  right: 6vw;
  top: 26%;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  text-align: center;
}

.nameCard {
  width: 100%;
  min-height: 7.4vh;
  box-sizing: border-box;
  padding: 0.9vh 3vw;
  border-radius: 3.0vh;
  margin-bottom: 1.0vh;
  background: rgba(255, 255, 255, 0.18);
  border: 0.22vh solid rgba(255, 255, 255, 0.42);
  box-shadow:
    0 1.0vh 2.4vh rgba(0,0,0,0.28),
    inset 0 0.12vh 0 rgba(255,255,255,0.35),
    inset 0 -0.12vh 0 rgba(255,255,255,0.10);
  backdrop-filter: blur(10px) saturate(135%);
  -webkit-backdrop-filter: blur(10px) saturate(135%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.nameCard:last-child {
  margin-bottom: 0;
}

.nameText {
  font-size: 7.6vh;
  line-height: 0.95;
  font-weight: 900;
  color: #ffffff;
  text-shadow:
    0.16vh 0.16vh 0 #000,
    -0.16vh 0.16vh 0 #000,
    0.16vh -0.16vh 0 #000,
    -0.16vh -0.16vh 0 #000,
    0 0.7vh 1.3vh rgba(0,0,0,0.72);
  white-space: normal;
  overflow-wrap: anywhere;
}

.namesMany {
  top: 25% !important;
}

.namesMany .nameCard {
  min-height: 6.4vh;
  border-radius: 2.6vh;
  padding: 0.7vh 2.4vw;
  margin-bottom: 0.9vh;
}

.namesMany .nameText {
  font-size: 5.8vh;
}

.namesLots {
  top: 23% !important;
}

.namesLots .nameCard {
  min-height: 5.6vh;
  border-radius: 2.2vh;
  padding: 0.55vh 2.2vw;
  margin-bottom: 0.7vh;
}

.namesLots .nameText {
  font-size: 4.65vh;
}

/* ISMENY NEDERST - kun bilde og pris, sortert lavest til høyest */
#iceBar {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 24.5vh;
  z-index: 4;
  box-sizing: border-box;
  padding: 1.0vh 1.2vw 1.1vh 1.2vw;
  background: linear-gradient(to bottom, #fff4a6 0%, #ffe172 45%, #ffd042 100%);
  border-top: 0.35vh solid rgba(215, 35, 50, 0.95);
  box-shadow: 0 -1.0vh 2.5vh rgba(0,0,0,0.34);
  overflow: hidden;
}

#iceLogoRow {
  position: absolute;
  top: 0.2vh;
  left: 0;
  right: 0;
  height: 2.8vh;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

#iceLogoPill {
  height: 2.8vh;
  min-width: 18vw;
  padding: 0 2.2vw;
  border-radius: 0 0 1.8vh 1.8vh;
  background: rgba(255,255,255,0.88);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #c8193b;
  font-size: 2.0vh;
  line-height: 1;
  font-weight: 900;
  letter-spacing: -0.04em;
  box-shadow: 0 0.35vh 1.0vh rgba(0,0,0,0.16);
}

#iceGrid {
  height: 100%;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(2, 1fr);
  column-gap: 0.65vw;
  row-gap: 0.65vh;
  padding-top: 2.3vh;
  box-sizing: border-box;
}

.iceGroup {
  position: relative;
  min-width: 0;
  height: 100%;
  border-radius: 1.8vh;
  background: rgba(255,255,255,0.32);
  border: 0.12vh solid rgba(255,255,255,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: inset 0 0.1vh 0 rgba(255,255,255,0.35);
}

.iceImages {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.05vw;
  box-sizing: border-box;
  padding: 0.25vh 0.25vw 2.45vh 0.25vw;
}

.iceImages img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 0.38vh 0.45vh rgba(0,0,0,0.25));
}

.iceImages.two img { max-width: 49%; }
.iceImages.three img { max-width: 33%; }

.icePrice {
  position: absolute;
  right: 0.35vw;
  bottom: 0.35vh;
  min-width: 4.6vh;
  height: 2.7vh;
  border-radius: 1.5vh;
  padding: 0 0.55vh;
  background: #d7192f;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.65vh;
  font-weight: 900;
  line-height: 1;
  box-shadow: 0 0.25vh 0.7vh rgba(0,0,0,0.28);
  white-space: nowrap;
}

#adView {
  position: relative;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background:
    radial-gradient(circle at top left, rgba(246,62,160,0.45), transparent 35%),
    radial-gradient(circle at bottom right, rgba(78,144,223,0.40), transparent 38%),
    linear-gradient(to bottom, #17232e, #1d2a37, #17232e);
  padding: 3vh 4vw;
  box-sizing: border-box;
}

#adBrand {
  position: absolute;
  top: 3vh;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 4.8vh;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

#adBox {
  width: 88%;
  border-radius: 3vh;
  padding: 4vh 3vw;
  background: rgba(255,255,255,0.12);
  border: 0.25vh solid rgba(255,255,255,0.22);
  box-shadow: 0 1.2vh 3vh rgba(0,0,0,0.22);
}

#adHeadline {
  font-size: 7.2vh;
  line-height: 0.95;
  font-weight: 900;
  text-transform: uppercase;
  text-shadow: 0 0.8vh 1.8vh rgba(0,0,0,0.35);
}

#adText {
  margin-top: 3vh;
  font-size: 4.2vh;
  line-height: 1.08;
  font-weight: 900;
  color: rgba(255,255,255,0.92);
}

#adBottom {
  position: absolute;
  bottom: 2vh;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 5.4vh;
  font-weight: 900;
}

#errorView {
  align-items: center;
  justify-content: center;
  text-align: center;
  flex-direction: column;
  gap: 3vh;
  background: #17232e;
  padding: 4vh 4vw;
  box-sizing: border-box;
}

#errorTitle {
  font-size: 5.8vh;
  font-weight: 900;
}

#errorText {
  font-size: 3.2vh;
  font-weight: 800;
  max-width: 90%;
  color: rgba(255,255,255,0.82);
}
</style>
</head>

<script>
var DATA_URL = "";

/*
  false = siden bruker datoen og viser riktige bursdager automatisk.
  true = viser TEST_DATA hele tiden, kun for testing.
*/
var FORCE_SHOW_TEST_BIRTHDAYS = false;

/* Brukes bare hvis FORCE_SHOW_TEST_BIRTHDAYS = true */
var TEST_DATA = [
  { name: "Leo 10 år!", start: "10:00", roomTime: "11:30" },
  { name: "Markus og Marita 12 år!", start: "10:00", roomTime: "11:30" }
];

/*
  Manuell bursdagsliste.
  Siden sjekker datoen selv.
*/
var MANUAL_BIRTHDAYS_BY_DATE = {
  "2026-05-11": [
    { name: "Sigrid 10 år!", start: "10:00", roomTime: "11:30" },
    { name: "Loke og Magnus 6 år!", start: "10:00", roomTime: "11:30" }
  ],
  "2026-05-09": [
    { name: "May 12 år!", start: "10:00", roomTime: "11:30" }
  ],
  "2026-05-10": [
    { name: "Anna og Marlene 8 år!", start: "10:00", roomTime: "11:30" },
    { name: "Olivia 8 år!", start: "10:00", roomTime: "11:30" },
    { name: "Alvaro 12 år!", start: "10:00", roomTime: "11:30" }
  ]
};

var birthdayData = [];
var adIndex = 0;

var ads = [
  {
    headline: "BOOK BURSDAG
HOS RUSH",
    text: "Feir dagen med hopping, pizza og eget bursdagsrom"
  },
  {
    headline: "MINISPRETT",
    text: "For de minste hopperne lørdag og søndag"
  },
  {
    headline: "RUSH AFTER DARK",
    text: "Lys, musikk og ekstra stemning i parken"
  },
  {
    headline: "KAFÉEN ER ÅPEN",
    text: "Slush, pizza, snacks og drikke finner du i kaféen"
  }
];

function pad(n) {
  return (n < 10 ? "0" : "") + n;
}

function formatClock(d) {
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function dateKey(d) {
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
}

function normalizeName(name) {
  return String(name || "").trim();
}

function formatBirthdayName(name) {
  var clean = normalizeName(name);
  if (!clean) return "";

  var parts = clean.split(",").map(function(part) {
    return part.trim();
  }).filter(function(part) {
    return part.length > 0;
  });

  if (parts.length <= 1) return clean;
  if (parts.length === 2) return parts[0] + " og " + parts[1];

  return parts.slice(0, -1).join(", ") + " og " + parts[parts.length - 1];
}

function getBirthdaysToShow() {
  var source = [];

  if (FORCE_SHOW_TEST_BIRTHDAYS) {
    source = TEST_DATA;
  } else if (DATA_URL) {
    source = birthdayData;
  } else {
    source = MANUAL_BIRTHDAYS_BY_DATE[dateKey(new Date())] || [];
  }

  var active = [];

  for (var i = 0; i < source.length; i++) {
    var item = source[i];
    var name = formatBirthdayName(item.name);
    if (!name) continue;
    active.push(name);
  }

  return active;
}

function setActive(viewId) {
  document.getElementById("birthdayView").className = "";
  document.getElementById("adView").className = "";
  document.getElementById("errorView").className = "";
  document.getElementById(viewId).className = "active";
}

function renderBirthdays(names) {
  setActive("birthdayView");

  var container = document.getElementById("names");

  if (names.length >= 5) {
    container.className = "namesLots";
  } else if (names.length > 1) {
    container.className = "namesMany";
  } else {
    container.className = "";
  }

  var html = "";
  for (var i = 0; i < names.length; i++) {
    html += ''
      + '<div class="nameCard">'
      +   '<div class="nameText">' + escapeHtml(names[i]) + '</div>'
      + '</div>';
  }

  container.innerHTML = html;
}

function renderAd() {
  setActive("adView");

  var ad = ads[adIndex % ads.length];
  document.getElementById("adHeadline").innerHTML = escapeHtml(ad.headline).replace(/
/g, "<br>");
  document.getElementById("adText").innerHTML = escapeHtml(ad.text);
}

function renderError() {
  setActive("errorView");
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function tick() {
  var now = new Date();
  document.getElementById("adBottom").innerHTML = formatClock(now);

  var names = getBirthdaysToShow();

  if (names.length > 0) {
    renderBirthdays(names);
  } else {
    renderAd();
  }
}

function loadDataJsonp() {
  if (!DATA_URL) {
    birthdayData = TEST_DATA;
    tick();
    return;
  }

  var old = document.getElementById("birthdayDataScript");
  if (old) old.remove();

  var script = document.createElement("script");
  script.id = "birthdayDataScript";
  script.src = DATA_URL + "?callback=receiveBirthdayData&v=" + Date.now();
  script.onerror = function() {
    renderError();
  };
  document.body.appendChild(script);
}

function receiveBirthdayData(data) {
  if (data && data.birthdays && Array.isArray(data.birthdays)) {
    birthdayData = data.birthdays;
  } else if (Array.isArray(data)) {
    birthdayData = data;
  } else {
    birthdayData = [];
  }

  tick();
}

loadDataJsonp();
setInterval(tick, 1000);
setInterval(loadDataJsonp, 60000);
setInterval(function() {
  adIndex++;
}, 12000);
</script>
</body>
