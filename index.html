<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>Rush Haugesund Storskjerm</title>
<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  background: #000; font-family: Arial, Helvetica, sans-serif;
}
.wrap { position: relative; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
.slide-frame {
  position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; z-index: 1;
}
.bottom-fade {
  position: absolute; left: 0; right: 0; bottom: 0; height: 170px;
  background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.48)); z-index: 2; pointer-events: none;
}
.google-cover {
  position: absolute; left: 0; right: 0; bottom: 0; height: 58px; background: #000; z-index: 3; pointer-events: none;
}
.bottom {
  position: absolute; left: 0; right: 0; bottom: 14px; z-index: 4; height: 15vh; min-height: 118px;
  padding: 0 12px 0 12px; box-sizing: border-box; display: flex; align-items: flex-end; gap: 12px;
}
.clock {
  min-width: 140px; color: #fff; font-weight: 900; font-size: 7.2vh; line-height: 1; padding-bottom: 8px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.65);
}
.rows { flex: 1; display: flex; gap: 10px; align-items: flex-end; min-width: 0; }
.row {
  flex: 1; min-width: 0; min-height: 60px; border-radius: 12px; padding: 14px 16px; box-sizing: border-box;
  display: flex; align-items: center; justify-content: space-between; font-weight: 800;
  border: 1px solid rgba(255,255,255,0.16); box-shadow: 0 4px 14px rgba(0,0,0,0.24);
}
.row.first { flex: 1.12; }
.row span:first-child { font-size: 1.55vw; white-space: nowrap; margin-right: 10px; }
.row span:last-child { font-size: 1.10vw; white-space: nowrap; }
.rosa { background: rgba(255, 64, 160, 0.80); color: #111; }
.rod { background: rgba(245, 26, 26, 0.80); color: #fff; }
.solv { background: rgba(190, 190, 190, 0.82); color: #111; }
.gronn { background: rgba(92, 177, 48, 0.82); color: #111; }
.oransje { background: rgba(247, 93, 27, 0.82); color: #111; }
.bla { background: rgba(95, 145, 215, 0.82); color: #111; }
.gul { background: rgba(240, 234, 30, 0.85); color: #111; }
.morklilla { background: rgba(96, 40, 112, 0.82); color: #fff; }
.svart { background: rgba(0, 0, 0, 0.82); color: #fff; }
.hvit { background: rgba(255, 255, 255, 0.84); color: #111; }
.minisprett { background: rgba(167, 234, 247, 0.84); color: #111; }
.afterdark { background: rgba(36, 20, 75, 0.84); color: #fff; }
@media (max-width: 1600px) {
  .clock { font-size: 6.3vh; min-width: 120px; }
  .row span:first-child { font-size: 1.8vw; }
  .row span:last-child { font-size: 1.28vw; }
}
</style>
</head>
<body>
<div class="wrap">
  <iframe class="slide-frame" src="https://docs.google.com/presentation/d/e/2PACX-1vQqMYC-UePTy50-UFzUtnS1D9nRH-bBJuaihR7Lt6CeCBMiRvIQtqfr0zQvXE4lx9hGTQu9WA0Xl_IW/embed?start=true&loop=true&delayms=5000" allowfullscreen="true"></iframe>
  <div class="bottom-fade"></div>
  <div class="google-cover"></div>
  <div class="bottom" id="bottom"></div>
</div>
<script>
(function() {
  var SHOW_COUNT = 4;
  var AFTER_DARK_DATES = ['2026-04-10','2026-04-17','2026-05-15','2026-05-29','2026-06-12'];

  var WEEKDAY = [
    ['10:30','Rosa','rosa'], ['11:00','Rød','rod'], ['11:30','Sølv','solv'], ['12:00','Grønn','gronn'],
    ['12:30','Oransje','oransje'], ['13:00','Blå','bla'], ['13:30','Gul','gul'], ['14:00','Mørk Lilla','morklilla'],
    ['14:30','Svart','svart'], ['15:00','Hvit','hvit'], ['15:30','Rosa','rosa'], ['16:00','Rød','rod'],
    ['16:30','Sølv','solv'], ['17:00','Grønn','gronn'], ['17:30','Oransje','oransje'], ['18:00','Blå','bla'],
    ['18:30','Gul','gul'], ['19:00','Mørk Lilla','morklilla'], ['19:30','Svart','svart'], ['20:00','Hvit','hvit']
  ];
  var WEEKEND = [
    ['11:00','Minisprett','minisprett'], ['11:30','Sølv','solv'], ['12:00','Grønn','gronn'], ['12:30','Oransje','oransje'],
    ['13:00','Blå','bla'], ['13:30','Gul','gul'], ['14:00','Mørk Lilla','morklilla'], ['14:30','Svart','svart'],
    ['15:00','Hvit','hvit'], ['15:30','Rosa','rosa'], ['16:00','Rød','rod'], ['16:30','Sølv','solv'],
    ['17:00','Grønn','gronn'], ['17:30','Oransje','oransje'], ['18:00','Blå','bla'], ['18:30','Gul','gul'], ['19:00','Mørk Lilla','morklilla']
  ];

  function parseHM(text) {
    var p = text.split(':');
    return Number(p[0]) * 60 + Number(p[1]);
  }
  function toDate(base, hm) {
    var d = new Date(base.getFullYear(), base.getMonth(), base.getDate(), 0, 0, 0, 0);
    d.setMinutes(parseHM(hm));
    return d;
  }
  function ymd(d) {
    function z(n){ return (n < 10 ? '0' : '') + n; }
    return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate());
  }
  function isAfterDarkDate(d) { return AFTER_DARK_DATES.indexOf(ymd(d)) !== -1; }
  function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }
  function isMinisprettNow(d) { return isWeekend(d) && (d.getHours() * 60 + d.getMinutes()) >= 570 && (d.getHours() * 60 + d.getMinutes()) < 660; }
  function isAfterDarkNow(d) { var m = d.getHours() * 60 + d.getMinutes(); return isAfterDarkDate(d) && m >= 1200 && m < 1320; }
  function fmtClock(d) {
    var h = d.getHours(), m = d.getMinutes();
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  }
  function fmtShort(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    return h > 0 ? (h + ' t ' + m + ' min') : (m + ' min');
  }
  function fmtWithSec(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return m + ' min ' + sec + ' sek';
  }
  function getBaseSchedule(now) {
    var src = isWeekend(now) ? WEEKEND : WEEKDAY;
    var out = [];
    for (var i = 0; i < src.length; i++) {
      out.push({
        label: src[i][1],
        cls: src[i][2],
        exit: toDate(now, src[i][0]),
        time: src[i][0]
      });
    }
    return out;
  }
  function getIndexFuture(schedule, now) {
    for (var i = 0; i < schedule.length; i++) {
      if (schedule[i].exit.getTime() > now.getTime()) return i;
    }
    return -1;
  }
  function buildDisplayList(now) {
    var schedule = getBaseSchedule(now);
    var futureIndex = getIndexFuture(schedule, now);
    var items = [];
    var nextFutureIndex = -1;

    if (isAfterDarkNow(now)) {
      items.push({ label: 'After Dark', cls: 'afterdark', status: 'countdown', exit: toDate(now, '22:00') });
      nextFutureIndex = 0;
      return { items: items, nextFutureIndex: nextFutureIndex };
    }

    if (isMinisprettNow(now)) {
      items.push({ label: 'Minisprett', cls: 'minisprett', status: 'countdown', exit: toDate(now, '11:00') });
      for (var m = 1; m < schedule.length && items.length < SHOW_COUNT; m++) {
        items.push({ label: schedule[m].label, cls: schedule[m].cls, status: 'countdown', exit: schedule[m].exit });
      }
      nextFutureIndex = 0;
      return { items: items, nextFutureIndex: nextFutureIndex };
    }

    if (futureIndex === -1) {
      if (schedule.length) items.push({ label: schedule[schedule.length - 1].label, cls: schedule[schedule.length - 1].cls, status: 'done' });
      return { items: items, nextFutureIndex: -1 };
    }

    if (futureIndex > 0) {
      items.push({ label: schedule[futureIndex - 1].label, cls: schedule[futureIndex - 1].cls, status: 'done' });
    }

    for (var i = futureIndex; i < schedule.length && items.length < SHOW_COUNT; i++) {
      items.push({ label: schedule[i].label, cls: schedule[i].cls, status: 'countdown', exit: schedule[i].exit });
      if (nextFutureIndex === -1) nextFutureIndex = items.length - 1;
    }

    return { items: items, nextFutureIndex: nextFutureIndex };
  }
  function render() {
    var now = new Date();
    var el = document.getElementById('bottom');
    var state = buildDisplayList(now);
    var html = '<div class="clock">' + fmtClock(now) + '</div><div class="rows">';

    for (var i = 0; i < state.items.length; i++) {
      var it = state.items[i];
      var right = 'FERDIG';
      if (it.status === 'countdown') {
        right = (i === state.nextFutureIndex) ? fmtWithSec(it.exit.getTime() - now.getTime()) : fmtShort(it.exit.getTime() - now.getTime());
      }
      html += '<div class="row ' + it.cls + (i === 0 ? ' first' : '') + '"><span>' + it.label.toUpperCase() + '</span><span>' + right + '</span></div>';
    }
    html += '</div>';
    el.innerHTML = html;
  }
  setInterval(render, 1000);
  render();
})();
</script>
</body>
</html>
