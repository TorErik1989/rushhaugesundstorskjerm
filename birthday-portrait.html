<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Bursdag TV</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #17232e;
  font-family: Arial, Helvetica, sans-serif;
  cursor: none;
}

body {
  color: #ffffff;
}

#page {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 2.2vh 3vw 2vh 3vw;
  background:
    radial-gradient(circle at top left, rgba(246,62,160,0.45), transparent 35%),
    radial-gradient(circle at bottom right, rgba(78,144,223,0.40), transparent 38%),
    linear-gradient(to bottom, #17232e, #1d2a37, #17232e);
  display: flex;
  flex-direction: column;
}

#birthdayView,
#adView,
#errorView {
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
}

#birthdayView.active,
#adView.active,
#errorView.active {
  display: flex;
}

#topBrand {
  flex: 0 0 8vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 4.6vh;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

#birthdayTitle {
  flex: 0 0 18vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 6.4vh;
  line-height: 0.95;
  font-weight: 900;
  text-transform: uppercase;
  text-shadow: 0 0.8vh 1.8vh rgba(0,0,0,0.35);
}

#names {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2.1vh;
}

.nameCard {
  width: 100%;
  min-height: 11vh;
  box-sizing: border-box;
  border-radius: 3vh;
  padding: 1.5vh 3vw;
  background: rgba(255,255,255,0.92);
  color: #17232e;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  box-shadow: 0 1.2vh 3vh rgba(0,0,0,0.28);
}

.nameText {
  font-size: 6.2vh;
  line-height: 0.95;
  font-weight: 900;
  white-space: normal;
  overflow-wrap: anywhere;
}

#bottomClock {
  flex: 0 0 8vh;
  display: flex;
  align-items: end;
  justify-content: center;
  font-size: 5.4vh;
  font-weight: 900;
}

#adView {
  justify-content: space-between;
  text-align: center;
}

#adBrand {
  flex: 0 0 9vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4.8vh;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

#adMain {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3vh;
}

#adHeadline {
  font-size: 7.2vh;
  line-height: 0.95;
  font-weight: 900;
  text-transform: uppercase;
  text-shadow: 0 0.8vh 1.8vh rgba(0,0,0,0.35);
}

#adText {
  font-size: 4.2vh;
  line-height: 1.08;
  font-weight: 900;
  max-width: 90%;
  color: rgba(255,255,255,0.92);
}

#adBox {
  width: 86%;
  border-radius: 3vh;
  padding: 3vh 3vw;
  background: rgba(255,255,255,0.12);
  border: 0.25vh solid rgba(255,255,255,0.22);
  box-shadow: 0 1.2vh 3vh rgba(0,0,0,0.22);
}

#adBottom {
  flex: 0 0 9vh;
  display: flex;
  align-items: end;
  justify-content: center;
  font-size: 5.4vh;
  font-weight: 900;
}

#errorView {
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 3vh;
}

#errorTitle {
  font-size: 5.8vh;
  font-weight: 900;
}

#errorText {
  font-size: 3.2vh;
  font-weight: 800;
  max-width: 90%;
  color: rgba(255,255,255,0.82);
}
</style>
</head>

<body>
<div id="page">
  <section id="birthdayView">
    <div id="topBrand">RUSH HAUGESUND</div>
    <div id="birthdayTitle">GRATULERER<br>MED DAGEN</div>
    <div id="names"></div>
    <div id="bottomClock">00:00</div>
  </section>

  <section id="adView">
    <div id="adBrand">RUSH HAUGESUND</div>
    <div id="adMain">
      <div id="adBox">
        <div id="adHeadline">BOOK BURSDAG<br>HOS RUSH</div>
        <div id="adText">Feir dagen med hopping, pizza og eget bursdagsrom</div>
      </div>
    </div>
    <div id="adBottom">00:00</div>
  </section>

  <section id="errorView">
    <div id="errorTitle">BURSDAGSSKJERM</div>
    <div id="errorText">Mangler kobling til bursdagsdata. Legg inn Apps Script-lenken i DATA_URL.</div>
  </section>
</div>

<script>
/*
  SETT INN WEB APP-LENKEN FRA GOOGLE APPS SCRIPT HER.
  Eksempel:
  var DATA_URL = "https://script.google.com/macros/s/AKfycbxxxxxxx/exec";
*/
var DATA_URL = "";

/* Testdata brukes bare hvis DATA_URL er tom. Slett gjerne senere. */
var TEST_DATA = [
  { name: "Arleen", start: "14:30", roomTime: "16:00" },
  { name: "Jennie", start: "16:30", roomTime: "17:30" }
];

var birthdayData = [];
var adIndex = 0;
var ads = [
  {
    headline: "BOOK BURSDAG\nHOS RUSH",
    text: "Feir dagen med hopping, pizza og eget bursdagsrom"
  },
  {
    headline: "MINISPRETT",
    text: "For de minste hopperne lørdag og søndag"
  },
  {
    headline: "RUSH AFTER DARK",
    text: "Lys, musikk og ekstra stemning i parken"
  },
  {
    headline: "KAFÉEN ER ÅPEN",
    text: "Slush, pizza, snacks og drikke finner du i kaféen"
  }
];

function pad(n) {
  return (n < 10 ? "0" : "") + n;
}

function formatClock(d) {
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function minutesFromTime(hhmm) {
  if (!hhmm) return null;
  var parts = String(hhmm).trim().split(":");
  if (parts.length < 2) return null;
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
}

function nowMinutes(now) {
  return now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
}

function isActiveBirthday(item, now) {
  var startMin = minutesFromTime(item.start);
  var roomMin = minutesFromTime(item.roomTime);
  if (startMin === null || roomMin === null) return false;

  var showFrom = startMin - 15;
  var showTo = roomMin + 60;
  var current = nowMinutes(now);

  return current >= showFrom && current <= showTo;
}

function normalizeName(name) {
  return String(name || "").trim();
}

function getActiveBirthdays(now) {
  var active = [];

  for (var i = 0; i < birthdayData.length; i++) {
    var item = birthdayData[i];
    var name = normalizeName(item.name);
    if (!name) continue;

    if (isActiveBirthday(item, now)) {
      active.push(name);
    }
  }

  return active;
}

function setActive(viewId) {
  document.getElementById("birthdayView").className = "";
  document.getElementById("adView").className = "";
  document.getElementById("errorView").className = "";
  document.getElementById(viewId).className = "active";
}

function renderBirthdays(names) {
  setActive("birthdayView");

  var container = document.getElementById("names");
  var html = "";

  for (var i = 0; i < names.length; i++) {
    html += ''
      + '<div class="nameCard">'
      +   '<div class="nameText">' + escapeHtml(names[i]) + '</div>'
      + '</div>';
  }

  container.innerHTML = html;
}

function renderAd() {
  setActive("adView");

  var ad = ads[adIndex % ads.length];
  document.getElementById("adHeadline").innerHTML = escapeHtml(ad.headline).replace(/\n/g, "<br>");
  document.getElementById("adText").innerHTML = escapeHtml(ad.text);
}

function renderError() {
  setActive("errorView");
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function tick() {
  var now = new Date();
  var clock = formatClock(now);

  document.getElementById("bottomClock").innerHTML = clock;
  document.getElementById("adBottom").innerHTML = clock;

  if (!birthdayData || birthdayData.length === 0) {
    if (!DATA_URL) {
      birthdayData = TEST_DATA;
    } else {
      renderError();
      return;
    }
  }

  var activeNames = getActiveBirthdays(now);

  if (activeNames.length > 0) {
    renderBirthdays(activeNames);
  } else {
    renderAd();
  }
}

function loadDataJsonp() {
  if (!DATA_URL) {
    birthdayData = TEST_DATA;
    tick();
    return;
  }

  var old = document.getElementById("birthdayDataScript");
  if (old) old.remove();

  var script = document.createElement("script");
  script.id = "birthdayDataScript";
  script.src = DATA_URL + "?callback=receiveBirthdayData&v=" + Date.now();
  script.onerror = function() {
    renderError();
  };
  document.body.appendChild(script);
}

function receiveBirthdayData(data) {
  if (data && data.birthdays && Array.isArray(data.birthdays)) {
    birthdayData = data.birthdays;
  } else if (Array.isArray(data)) {
    birthdayData = data;
  } else {
    birthdayData = [];
  }
  tick();
}

loadDataJsonp();
setInterval(tick, 1000);
setInterval(loadDataJsonp, 60000);
setInterval(function() { adIndex++; }, 12000);
</script>
</body>
</html>
