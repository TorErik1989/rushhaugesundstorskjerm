<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Bursdag TV</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
  cursor: none;
}

body {
  color: #ffffff;
}

#page {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
  background: #000;
}

#birthdayView,
#adView,
#errorView {
  width: 100%;
  height: 100%;
  display: none;
}

#birthdayView.active,
#adView.active,
#errorView.active {
  display: flex;
}

/* =========================
   BURSDAGSVISNING
========================= */
#birthdayView {
  position: relative;
  flex-direction: column;
  overflow: hidden;
  background: #000;
}

/* Øverste tekstfelt */
#topHeader {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 34%;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 3.5vh;
  box-sizing: border-box;
  text-align: center;
  background: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0.18));
}

#headerTop {
  font-size: 13vh;
  line-height: 0.9;
  font-weight: 900;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  text-shadow: 0 0.5vh 1vh rgba(0,0,0,0.35);
}

#headerBottom {
  margin-top: -0.8vh;
  font-size: 9vh;
  line-height: 0.9;
  font-weight: 900;
  color: #000000;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  -webkit-text-stroke: 0.8vh #98e61a;
  paint-order: stroke fill;
  text-shadow: 0 0.4vh 1vh rgba(0,0,0,0.35);
}

/* Dekorbilde under header */
#birthdayArt {
  position: absolute;
  left: 0;
  right: 0;
  top: 22%;
  bottom: 0;
  z-index: 1;
  background-image: url('birthday-bg.png');
  background-repeat: no-repeat;
  background-position: center bottom;
  background-size: 100% 100%;
  opacity: 1;
}

/* Mørk overlay så navn blir tydeligere */
#artOverlay {
  position: absolute;
  left: 0;
  right: 0;
  top: 22%;
  bottom: 0;
  z-index: 2;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.18),
    rgba(0,0,0,0.08) 20%,
    rgba(0,0,0,0.18) 55%,
    rgba(0,0,0,0.10)
  );
}

/* Navnene */
#names {
  position: absolute;
  left: 7vw;
  right: 7vw;
  top: 46%;
  transform: translateY(-50%);
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.1vh;
  text-align: center;
}

.nameText {
  font-size: 6.7vh;
  line-height: 0.92;
  font-weight: 900;
  color: #ffffff;
  text-shadow:
    0.16vh 0.16vh 0 #000,
    -0.16vh 0.16vh 0 #000,
    0.16vh -0.16vh 0 #000,
    -0.16vh -0.16vh 0 #000,
    0 0.6vh 1.2vh rgba(0,0,0,0.65);
  white-space: normal;
  overflow-wrap: anywhere;
}

/* Når det er flere bursdager samtidig */
.namesMany .nameText {
  font-size: 5.3vh;
  line-height: 0.92;
}

.namesLots .nameText {
  font-size: 4.6vh;
  line-height: 0.92;
}

/* Liten Rush-logo som tekst */
#rushLogo {
  position: absolute;
  right: 3vw;
  bottom: 2.2vh;
  z-index: 4;
  font-size: 4.2vh;
  font-weight: 900;
  font-style: italic;
  letter-spacing: 0.02em;
  color: #ffffff;
  opacity: 0.95;
}

/* =========================
   REKLAMEVISNING
========================= */
#adView {
  position: relative;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  background:
    radial-gradient(circle at top left, rgba(246,62,160,0.45), transparent 35%),
    radial-gradient(circle at bottom right, rgba(78,144,223,0.40), transparent 38%),
    linear-gradient(to bottom, #17232e, #1d2a37, #17232e);
  padding: 3vh 4vw;
  box-sizing: border-box;
}

#adBrand {
  position: absolute;
  top: 3vh;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 4.8vh;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

#adBox {
  width: 88%;
  border-radius: 3vh;
  padding: 4vh 3vw;
  background: rgba(255,255,255,0.12);
  border: 0.25vh solid rgba(255,255,255,0.22);
  box-shadow: 0 1.2vh 3vh rgba(0,0,0,0.22);
}

#adHeadline {
  font-size: 7.2vh;
  line-height: 0.95;
  font-weight: 900;
  text-transform: uppercase;
  text-shadow: 0 0.8vh 1.8vh rgba(0,0,0,0.35);
}

#adText {
  margin-top: 3vh;
  font-size: 4.2vh;
  line-height: 1.08;
  font-weight: 900;
  color: rgba(255,255,255,0.92);
}

#adBottom {
  position: absolute;
  bottom: 2vh;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 5.4vh;
  font-weight: 900;
}

/* =========================
   FEILVISNING
========================= */
#errorView {
  align-items: center;
  justify-content: center;
  text-align: center;
  flex-direction: column;
  gap: 3vh;
  background: #17232e;
  padding: 4vh 4vw;
  box-sizing: border-box;
}

#errorTitle {
  font-size: 5.8vh;
  font-weight: 900;
}

#errorText {
  font-size: 3.2vh;
  font-weight: 800;
  max-width: 90%;
  color: rgba(255,255,255,0.82);
}
</style>
</head>

<body>
<div id="page">
  <section id="birthdayView">
    <div id="birthdayArt"></div>
    <div id="artOverlay"></div>

    <div id="topHeader">
      <div id="headerTop">GRATULERER</div>
      <div id="headerBottom">MED DAGEN</div>
    </div>

    <div id="names"></div>
    <div id="rushLogo">rush</div>
  </section>

  <section id="adView">
    <div id="adBrand">RUSH HAUGESUND</div>
    <div id="adBox">
      <div id="adHeadline">BOOK BURSDAG<br>HOS RUSH</div>
      <div id="adText">Feir dagen med hopping, pizza og eget bursdagsrom</div>
    </div>
    <div id="adBottom">00:00</div>
  </section>

  <section id="errorView">
    <div id="errorTitle">BURSDAGSSKJERM</div>
    <div id="errorText">Mangler kobling til bursdagsdata. Legg inn Apps Script-lenken i DATA_URL.</div>
  </section>
</div>

<script>
var DATA_URL = "";

/* true mens vi tester design */
var FORCE_SHOW_TEST_BIRTHDAYS = true;

var TEST_DATA = [
  { name: "Arleen", start: "14:30", roomTime: "16:00" },
  { name: "Jennie", start: "16:30", roomTime: "17:30" },
  { name: "Ulrik, Theodor, Tobias", start: "16:30", roomTime: "18:00" },
  { name: "Henrik, Vegard", start: "17:00", roomTime: "18:00" },
  { name: "Theo, Mathias, Alva, Sondre, Niko", start: "18:00", roomTime: "19:30" }
];

var birthdayData = [];
var adIndex = 0;

var ads = [
  {
    headline: "BOOK BURSDAG\nHOS RUSH",
    text: "Feir dagen med hopping, pizza og eget bursdagsrom"
  },
  {
    headline: "MINISPRETT",
    text: "For de minste hopperne lørdag og søndag"
  },
  {
    headline: "RUSH AFTER DARK",
    text: "Lys, musikk og ekstra stemning i parken"
  },
  {
    headline: "KAFÉEN ER ÅPEN",
    text: "Slush, pizza, snacks og drikke finner du i kaféen"
  }
];

function pad(n) {
  return (n < 10 ? "0" : "") + n;
}

function formatClock(d) {
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function minutesFromTime(hhmm) {
  if (!hhmm) return null;
  var parts = String(hhmm).trim().split(":");
  if (parts.length < 2) return null;
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
}

function nowMinutes(now) {
  return now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
}

function isActiveBirthday(item, now) {
  var startMin = minutesFromTime(item.start);
  var roomMin = minutesFromTime(item.roomTime);
  if (startMin === null || roomMin === null) return false;

  var showFrom = startMin - 15;
  var showTo = roomMin + 60;
  var current = nowMinutes(now);

  return current >= showFrom && current <= showTo;
}

function normalizeName(name) {
  return String(name || "").trim();
}

function getActiveBirthdays(now) {
  var active = [];

  for (var i = 0; i < birthdayData.length; i++) {
    var item = birthdayData[i];
    var name = normalizeName(item.name);

    if (!name) continue;

    if (FORCE_SHOW_TEST_BIRTHDAYS || isActiveBirthday(item, now)) {
      active.push(name);
    }
  }

  return active;
}

function setActive(viewId) {
  document.getElementById("birthdayView").className = "";
  document.getElementById("adView").className = "";
  document.getElementById("errorView").className = "";
  document.getElementById(viewId).className = "active";
}

function renderBirthdays(names) {
  setActive("birthdayView");

  var container = document.getElementById("names");

  if (names.length >= 5) {
    container.className = "namesLots";
  } else if (names.length > 1) {
    container.className = "namesMany";
  } else {
    container.className = "";
  }

  var html = "";
  for (var i = 0; i < names.length; i++) {
    html += '<div class="nameText">' + escapeHtml(names[i]) + '</div>';
  }

  container.innerHTML = html;
}

function renderAd() {
  setActive("adView");

  var ad = ads[adIndex % ads.length];
  document.getElementById("adHeadline").innerHTML = escapeHtml(ad.headline).replace(/\n/g, "<br>");
  document.getElementById("adText").innerHTML = escapeHtml(ad.text);
}

function renderError() {
  setActive("errorView");
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function tick() {
  var now = new Date();
  document.getElementById("adBottom").innerHTML = formatClock(now);

  if (!birthdayData || birthdayData.length === 0) {
    if (!DATA_URL) {
      birthdayData = TEST_DATA;
    } else {
      renderError();
      return;
    }
  }

  var activeNames = getActiveBirthdays(now);

  if (activeNames.length > 0) {
    renderBirthdays(activeNames);
  } else {
    renderAd();
  }
}

function loadDataJsonp() {
  if (!DATA_URL) {
    birthdayData = TEST_DATA;
    tick();
    return;
  }

  var old = document.getElementById("birthdayDataScript");
  if (old) old.remove();

  var script = document.createElement("script");
  script.id = "birthdayDataScript";
  script.src = DATA_URL + "?callback=receiveBirthdayData&v=" + Date.now();

  script.onerror = function() {
    renderError();
  };

  document.body.appendChild(script);
}

function receiveBirthdayData(data) {
  if (data && data.birthdays && Array.isArray(data.birthdays)) {
    birthdayData = data.birthdays;
  } else if (Array.isArray(data)) {
    birthdayData = data;
  } else {
    birthdayData = [];
  }
  tick();
}

loadDataJsonp();
setInterval(tick, 1000);
setInterval(loadDataJsonp, 60000);
setInterval(function() {
  adIndex++;
}, 12000);
</script>
</body>
</html>
