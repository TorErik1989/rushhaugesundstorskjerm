<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Rush BandTV</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #17232e;
  font-family: Arial, Helvetica, sans-serif;
}
body { color: #f4f4f4; }

#page {
  position: fixed;
  inset: 0;
  background: linear-gradient(to right, #17232e, #1d2a37, #17232e);
}

/* Header pinned to top */
#header {
  position: absolute;
  left: 18px;
  right: 18px;
  top: 18px;
  height: 96px;
}
#title {
  position: absolute;
  left: 0;
  right: 0;
  top: 8px;
  text-align: center;
  font-size: 62px;
  font-weight: 900;
  line-height: 1;
}
#clock {
  position: absolute;
  right: 4px;
  top: 0;
  font-size: 92px;
  font-weight: 900;
  line-height: 0.95;
}

/* Bands container pinned from under header to near bottom */
#bands {
  position: absolute;
  left: 16px;
  right: 16px;
  top: 120px;
  bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.band {
  flex: 1 1 0;
  min-height: 0;
  border-radius: 26px;
  box-sizing: border-box;
  padding: 0 36px 0 76px;
  overflow: hidden;
}
.bandTable {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.bandLeft, .bandRight {
  vertical-align: middle;
}
.bandLeft {
  width: 46%;
  text-align: left;
}
.bandRight {
  width: 54%;
  text-align: right;
}
.name {
  font-size: 46px;
  font-weight: 900;
  line-height: 1;
  white-space: nowrap;
}
.time {
  font-size: 50px;
  font-weight: 900;
  line-height: 1;
  white-space: nowrap;
}

.pink { background: #f63ea0; color: #000000; }
.red { background: #ff1414; color: #ffffff; }
.silver { background: #d9d9d9; color: #000000; }
.green { background: #62bb2b; color: #000000; }
.orange { background: #ff6419; color: #000000; }
.blue { background: #4e90df; color: #ffffff; }
.yellow { background: #f2ee18; color: #000000; }
.purple { background: #6a217e; color: #ffffff; }
.black { background: #000000; color: #ffffff; }
.white { background: #ffffff; color: #000000; }
.mini { background: #9fe9f2; color: #000000; }

.hero {
  display: none;
  position: absolute;
  inset: 0;
  background-color: #17232e;
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}
.heroOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.22);
}
.heroContent {
  position: absolute;
  left: 34px;
  right: 34px;
  bottom: 34px;
  z-index: 2;
}
.heroTitle {
  font-size: 64px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 12px;
  color: #ffffff;
}
.heroTime {
  display: inline-block;
  font-size: 54px;
  font-weight: 900;
  line-height: 1;
  color: #ffffff;
  background: rgba(0,0,0,0.34);
  border-radius: 18px;
  padding: 14px 18px;
}
</style>
</head>
<body>
  <div id="page">
    <div id="normalView">
      <div id="header">
        <div id="title">HOPPETID</div>
        <div id="clock">00:00</div>
      </div>
      <div id="bands"></div>
    </div>

    <div id="miniHero" class="hero">
      <div class="heroOverlay"></div>
      <div class="heroContent">
        <div class="heroTitle">MINISPRETT PÅGÅR</div>
        <div class="heroTime" id="miniTime">00 min 00 sek</div>
      </div>
    </div>

    <div id="afterHero" class="hero">
      <div class="heroOverlay"></div>
      <div class="heroContent">
        <div class="heroTitle">AFTER DARK</div>
        <div class="heroTime" id="afterTime">00 min 00 sek</div>
      </div>
    </div>
  </div>

<script>
var weekdayPlan = [
  { out: "10:30", color: "pink", label: "ROSA" },
  { out: "11:00", color: "red", label: "RØD" },
  { out: "11:30", color: "silver", label: "SØLV" },
  { out: "12:00", color: "green", label: "GRØNN" },
  { out: "12:30", color: "orange", label: "ORANSJE" },
  { out: "13:00", color: "blue", label: "BLÅ" },
  { out: "13:30", color: "yellow", label: "GUL" },
  { out: "14:00", color: "purple", label: "MØRK LILLA" },
  { out: "14:30", color: "black", label: "SVART" },
  { out: "15:00", color: "white", label: "HVIT" },
  { out: "15:30", color: "pink", label: "ROSA" },
  { out: "16:00", color: "red", label: "RØD" },
  { out: "16:30", color: "silver", label: "SØLV" },
  { out: "17:00", color: "green", label: "GRØNN" },
  { out: "17:30", color: "orange", label: "ORANSJE" },
  { out: "18:00", color: "blue", label: "BLÅ" },
  { out: "18:30", color: "yellow", label: "GUL" },
  { out: "19:00", color: "purple", label: "MØRK LILLA" },
  { out: "19:30", color: "black", label: "SVART" },
  { out: "20:00", color: "white", label: "HVIT" }
];

var weekendPlan = [
  { out: "11:00", color: "mini", label: "MINISPRETT" },
  { out: "11:30", color: "silver", label: "SØLV" },
  { out: "12:00", color: "green", label: "GRØNN" },
  { out: "12:30", color: "orange", label: "ORANSJE" },
  { out: "13:00", color: "blue", label: "BLÅ" },
  { out: "13:30", color: "yellow", label: "GUL" },
  { out: "14:00", color: "purple", label: "MØRK LILLA" },
  { out: "14:30", color: "black", label: "SVART" },
  { out: "15:00", color: "white", label: "HVIT" },
  { out: "15:30", color: "pink", label: "ROSA" },
  { out: "16:00", color: "red", label: "RØD" },
  { out: "16:30", color: "silver", label: "SØLV" },
  { out: "17:00", color: "green", label: "GRØNN" },
  { out: "17:30", color: "orange", label: "ORANSJE" },
  { out: "18:00", color: "blue", label: "BLÅ" },
  { out: "18:30", color: "yellow", label: "GUL" },
  { out: "19:00", color: "purple", label: "MØRK LILLA" }
];

var afterDarkDates = {
  "2026-04-10": true,
  "2026-04-17": true,
  "2026-05-15": true,
  "2026-05-29": true,
  "2026-06-12": true
};

var visibleBands = 5;

function pad(n) { return (n < 10 ? "0" : "") + n; }
function formatClock(d) { return pad(d.getHours()) + ":" + pad(d.getMinutes()); }
function dateKey(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
function msAtToday(hhmm, now) {
  var parts = hhmm.split(":");
  var d = new Date(now.getTime());
  d.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  return d.getTime();
}
function formatRemaining(ms, withSeconds) {
  var total = Math.max(0, Math.floor(ms / 1000));
  var h = Math.floor(total / 3600);
  total -= h * 3600;
  var m = Math.floor(total / 60);
  var s = total - m * 60;
  if (withSeconds) {
    if (h > 0) return h + " t " + m + " min " + s + " sek";
    return m + " min " + s + " sek";
  }
  if (h > 0) return h + " t " + m + " min";
  return m + " min";
}
function isWeekend(now) { var d = now.getDay(); return d === 0 || d === 6; }
function isMini(now) {
  if (!isWeekend(now)) return false;
  var t = now.getTime();
  return t >= msAtToday("09:30", now) && t < msAtToday("11:00", now);
}
function isAfterDark(now) {
  if (!afterDarkDates[dateKey(now)]) return false;
  var t = now.getTime();
  return t >= msAtToday("20:00", now) && t < msAtToday("22:00", now);
}
function currentPlan(now) { return isWeekend(now) ? weekendPlan : weekdayPlan; }

function computeRows(now) {
  var plan = currentPlan(now);
  var nowMs = now.getTime();
  var firstFuture = -1;
  for (var i = 0; i < plan.length; i++) {
    if (msAtToday(plan[i].out, now) > nowMs) {
      firstFuture = i;
      break;
    }
  }
  if (firstFuture === -1) firstFuture = plan.length;

  var rows = [];
  if (firstFuture > 0) {
    var prev = plan[firstFuture - 1];
    rows.push({ label: prev.label, color: prev.color, status: "done", remaining: 0 });
  }
  for (var j = firstFuture; j < plan.length && rows.length < visibleBands; j++) {
    rows.push({
      label: plan[j].label,
      color: plan[j].color,
      status: "active",
      remaining: msAtToday(plan[j].out, now) - nowMs
    });
  }
  while (rows.length < visibleBands) {
    rows.push({ label: "", color: "black", status: "empty", remaining: 0 });
  }

  /* finished at bottom, increasing upward */
  rows.reverse();
  return rows;
}

function showNormal() {
  document.getElementById("normalView").style.display = "block";
  document.getElementById("miniHero").style.display = "none";
  document.getElementById("afterHero").style.display = "none";
}
function showMini() {
  document.getElementById("normalView").style.display = "none";
  document.getElementById("miniHero").style.display = "block";
  document.getElementById("afterHero").style.display = "none";
}
function showAfter() {
  document.getElementById("normalView").style.display = "none";
  document.getElementById("miniHero").style.display = "none";
  document.getElementById("afterHero").style.display = "block";
}

function renderNormal(now) {
  showNormal();
  document.getElementById("clock").innerHTML = formatClock(now);

  var rows = computeRows(now);
  var activeRows = [];
  for (var a = 0; a < rows.length; a++) {
    if (rows[a].status === "active") activeRows.push(rows[a]);
  }
  var shortestActive = null;
  if (activeRows.length) {
    shortestActive = activeRows[0];
    for (var b = 1; b < activeRows.length; b++) {
      if (activeRows[b].remaining < shortestActive.remaining) shortestActive = activeRows[b];
    }
  }

  var html = "";
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var timeText = "";
    if (r.status === "done") timeText = "FERDIG";
    else if (r.status === "active") timeText = formatRemaining(r.remaining, shortestActive && r === shortestActive);

    html += '<div class="band ' + r.color + '"><table class="bandTable"><tr>'
      + '<td class="bandLeft"><div class="name">' + r.label + '</div></td>'
      + '<td class="bandRight"><div class="time">' + timeText + '</div></td>'
      + '</tr></table></div>';
  }
  document.getElementById("bands").innerHTML = html;
}

function renderMini(now) {
  showMini();
  document.getElementById("miniHero").style.backgroundImage = "url('minisprett.png')";
  document.getElementById("miniTime").innerHTML = formatRemaining(msAtToday("11:00", now) - now.getTime(), true);
}
function renderAfter(now) {
  showAfter();
  document.getElementById("afterHero").style.backgroundImage = "url('afterdark.png')";
  document.getElementById("afterTime").innerHTML = formatRemaining(msAtToday("22:00", now) - now.getTime(), true);
}

function tick() {
  var now = new Date();
  if (isAfterDark(now)) renderAfter(now);
  else if (isMini(now)) renderMini(now);
  else renderNormal(now);
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
