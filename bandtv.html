<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>Rush Haugesund BandTV</title>
<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  background: #111; font-family: Arial, Helvetica, sans-serif; color: #fff;
}
body { cursor: none; }
.screen {
  width: 100vw; height: 100vh; background: linear-gradient(180deg, #1f2830 0%, #15191d 100%);
  display: flex; flex-direction: column; box-sizing: border-box; padding: 2.2vh 2.2vw;
}
.topline {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.6vh;
}
.title {
  font-size: 5.5vh; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase;
}
.clock {
  font-size: 7.6vh; font-weight: 900; line-height: 1;
}
.bands {
  flex: 1; display: flex; flex-direction: column; gap: 1.6vh;
}
.band {
  flex: 1; border-radius: 1.4vh; display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.2vw; box-sizing: border-box; font-weight: 900; overflow: hidden;
}
.band .name { font-size: 6.2vh; line-height: 1; white-space: nowrap; }
.band .time { font-size: 7.0vh; line-height: 1; white-space: nowrap; }
.band.done .time { font-size: 6.2vh; }
.rosa { background: #ff40a0; color: #111; }
.rod { background: #f51a1a; color: #fff; }
.solv { background: #bebebe; color: #111; }
.gronn { background: #5cb130; color: #111; }
.oransje { background: #f75d1b; color: #111; }
.bla { background: #5f91d7; color: #111; }
.gul { background: #f0ea1e; color: #111; }
.morklilla { background: #602870; color: #fff; }
.svart { background: #000; color: #fff; }
.hvit { background: #fff; color: #111; }
.minisprett { background: #a7eaf7; color: #111; }
.afterdark { background: #24144b; color: #fff; }
.hero {
  flex: 1; position: relative; border-radius: 1.6vh; overflow: hidden; background: #111;
}
.hero img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.hero-overlay {
  position: absolute; left: 0; right: 0; bottom: 0; padding: 2.2vh 2.2vw;
  background: linear-gradient(to top, rgba(0,0,0,0.72), rgba(0,0,0,0));
}
.hero-title { font-size: 6.0vh; font-weight: 900; line-height: 1; margin-bottom: 0.8vh; text-transform: uppercase; }
.hero-sub { font-size: 4.4vh; font-weight: 800; line-height: 1; }
.hero-count { font-size: 7.2vh; font-weight: 900; line-height: 1; margin-top: 1.0vh; }
.tv-safe { backdrop-filter: none !important; filter: none !important; }
</style>
</head>
<body>
<div class="screen tv-safe" id="screen"></div>
<script>
(function() {
  var SHOW_COUNT = 5;
  var AFTER_DARK_DATES = ['2026-04-10','2026-04-17','2026-05-15','2026-05-29','2026-06-12'];
  var WEEKDAY = [
    ['10:30','Rosa','rosa'], ['11:00','Rød','rod'], ['11:30','Sølv','solv'], ['12:00','Grønn','gronn'],
    ['12:30','Oransje','oransje'], ['13:00','Blå','bla'], ['13:30','Gul','gul'], ['14:00','Mørk Lilla','morklilla'],
    ['14:30','Svart','svart'], ['15:00','Hvit','hvit'], ['15:30','Rosa','rosa'], ['16:00','Rød','rod'],
    ['16:30','Sølv','solv'], ['17:00','Grønn','gronn'], ['17:30','Oransje','oransje'], ['18:00','Blå','bla'],
    ['18:30','Gul','gul'], ['19:00','Mørk Lilla','morklilla'], ['19:30','Svart','svart'], ['20:00','Hvit','hvit']
  ];
  var WEEKEND = [
    ['11:00','Minisprett','minisprett'], ['11:30','Sølv','solv'], ['12:00','Grønn','gronn'], ['12:30','Oransje','oransje'],
    ['13:00','Blå','bla'], ['13:30','Gul','gul'], ['14:00','Mørk Lilla','morklilla'], ['14:30','Svart','svart'],
    ['15:00','Hvit','hvit'], ['15:30','Rosa','rosa'], ['16:00','Rød','rod'], ['16:30','Sølv','solv'],
    ['17:00','Grønn','gronn'], ['17:30','Oransje','oransje'], ['18:00','Blå','bla'], ['18:30','Gul','gul'], ['19:00','Mørk Lilla','morklilla']
  ];

  function parseHM(text) { var p = text.split(':'); return Number(p[0]) * 60 + Number(p[1]); }
  function toDate(base, hm) { var d = new Date(base.getFullYear(), base.getMonth(), base.getDate(), 0, 0, 0, 0); d.setMinutes(parseHM(hm)); return d; }
  function ymd(d) { function z(n){ return (n < 10 ? '0' : '') + n; } return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate()); }
  function isAfterDarkDate(d) { return AFTER_DARK_DATES.indexOf(ymd(d)) !== -1; }
  function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }
  function isMinisprettNow(d) { var m = d.getHours() * 60 + d.getMinutes(); return isWeekend(d) && m >= 570 && m < 660; }
  function isAfterDarkNow(d) { var m = d.getHours() * 60 + d.getMinutes(); return isAfterDarkDate(d) && m >= 1200 && m < 1320; }
  function fmtClock(d) { var h = d.getHours(), m = d.getMinutes(); return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m; }
  function fmtShort(ms) { var s = Math.max(0, Math.floor(ms / 1000)), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); return h > 0 ? (h + ' t ' + m + ' min') : (m + ' min'); }
  function fmtWithSec(ms) { var s = Math.max(0, Math.floor(ms / 1000)), m = Math.floor(s / 60), sec = s % 60; return m + ' min ' + sec + ' sek'; }
  function getBaseSchedule(now) {
    var src = isWeekend(now) ? WEEKEND : WEEKDAY;
    var out = [];
    for (var i = 0; i < src.length; i++) out.push({ label: src[i][1], cls: src[i][2], exit: toDate(now, src[i][0]), time: src[i][0] });
    return out;
  }
  function getIndexFuture(schedule, now) {
    for (var i = 0; i < schedule.length; i++) if (schedule[i].exit.getTime() > now.getTime()) return i;
    return -1;
  }
  function buildDisplayList(now) {
    var schedule = getBaseSchedule(now), futureIndex = getIndexFuture(schedule, now), items = [], nextFutureIndex = -1;
    if (futureIndex === -1) { if (schedule.length) items.push({ label: schedule[schedule.length - 1].label, cls: schedule[schedule.length - 1].cls, status: 'done' }); return { items: items, nextFutureIndex: -1 }; }
    if (futureIndex > 0) items.push({ label: schedule[futureIndex - 1].label, cls: schedule[futureIndex - 1].cls, status: 'done' });
    for (var i = futureIndex; i < schedule.length && items.length < SHOW_COUNT; i++) {
      items.push({ label: schedule[i].label, cls: schedule[i].cls, status: 'countdown', exit: schedule[i].exit });
      if (nextFutureIndex === -1) nextFutureIndex = items.length - 1;
    }
    return { items: items, nextFutureIndex: nextFutureIndex };
  }
  function renderHero(title, subtitle, countdown, image) {
    var now = new Date();
    var html = '';
    html += '<div class="topline"><div class="title">GJENSTÅENDE HOPPETID</div><div class="clock">' + fmtClock(now) + '</div></div>';
    html += '<div class="hero"><img src="' + image + '" alt=""><div class="hero-overlay">';
    html += '<div class="hero-title">' + title + '</div>';
    if (subtitle) html += '<div class="hero-sub">' + subtitle + '</div>';
    if (countdown) html += '<div class="hero-count">' + countdown + '</div>';
    html += '</div></div>';
    document.getElementById('screen').innerHTML = html;
  }
  function renderBands() {
    var now = new Date();
    var state = buildDisplayList(now);
    var html = '<div class="topline"><div class="title">GJENSTÅENDE HOPPETID</div><div class="clock">' + fmtClock(now) + '</div></div><div class="bands">';
    for (var i = 0; i < state.items.length; i++) {
      var it = state.items[i];
      var right = 'FERDIG';
      if (it.status === 'countdown') right = (i === state.nextFutureIndex) ? fmtWithSec(it.exit.getTime() - now.getTime()) : fmtShort(it.exit.getTime() - now.getTime());
      html += '<div class="band ' + it.cls + (it.status === 'done' ? ' done' : '') + '"><div class="name">' + it.label.toUpperCase() + '</div><div class="time">' + right + '</div></div>';
    }
    html += '</div>';
    document.getElementById('screen').innerHTML = html;
  }
  function tick() {
    var now = new Date();
    if (isMinisprettNow(now)) {
      renderHero('MINISPRETT PÅGÅR', 'Til kl. 11:00', fmtShort(toDate(now, '11:00').getTime() - now.getTime()), 'minisprett.png');
      return;
    }
    if (isAfterDarkNow(now)) {
      renderHero('AFTER DARK PÅGÅR', 'Til kl. 22:00', fmtShort(toDate(now, '22:00').getTime() - now.getTime()), 'afterdark.png');
      return;
    }
    renderBands();
  }
  setInterval(tick, 1000);
  tick();
})();
</script>
</body>
</html>
