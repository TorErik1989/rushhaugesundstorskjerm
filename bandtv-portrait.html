<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Rush BandTV Portrett</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #17232e;
  font-family: Arial, Helvetica, sans-serif;
  cursor: none;
}
body { color: #f4f4f4; }

#page {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 2.0vh 1.8vw 1.6vh 1.8vw;
  background: linear-gradient(to right, #17232e, #1d2a37, #17232e);
}

#normalView {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* Båndene ligger øverst. HOPPETID og klokke ligger nederst. */
#bands {
  width: 100%;
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 1.05vh;
  order: 1;
}

#header {
  position: relative;
  width: 100%;
  height: 10.5vh;
  flex: 0 0 10.5vh;
  order: 2;
  margin-top: 1.2vh;
}
#title {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 1.7vh;
  text-align: center;
  font-size: 5.4vh;
  font-weight: 900;
  line-height: 1;
}
#clock {
  position: absolute;
  right: 0.4vw;
  bottom: 1.4vh;
  font-size: 5.4vh;
  font-weight: 900;
  line-height: 1;
}

.band {
  width: 100%;
  flex: 1 1 0;
  min-height: 0;
  border-radius: 2.8vh;
  box-sizing: border-box;
  padding: 0 3.6vw 0 5.2vw;
  overflow: hidden;
}
.bandTable {
  width: 100%;
  height: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.bandLeft, .bandRight {
  vertical-align: middle;
}
.bandLeft {
  width: 50%;
  text-align: left;
}
.bandRight {
  width: 50%;
  text-align: right;
}
.name {
  font-size: 3.9vh;
  font-weight: 900;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.time {
  font-size: 3.6vh;
  font-weight: 900;
  line-height: 1;
  white-space: nowrap;
}

.nextBand {
  outline: 0.62vh solid rgba(255,255,255,0.96);
  outline-offset: -0.62vh;
  box-shadow: 0 0 2.2vh rgba(255,255,255,0.45);
}
.doneBand {
  opacity: 0.52;
}
.emptyBand {
  opacity: 0.12;
}

.pink { background: #f63ea0; color: #000000; }
.red { background: #ff1414; color: #ffffff; }
.silver { background: #d9d9d9; color: #000000; }
.green { background: #62bb2b; color: #000000; }
.orange { background: #ff6419; color: #000000; }
.blue { background: #4e90df; color: #ffffff; }
.yellow { background: #f2ee18; color: #000000; }
.purple { background: #6a217e; color: #ffffff; }
.black { background: #000000; color: #ffffff; }
.white { background: #ffffff; color: #000000; }
.mini { background: #9fe9f2; color: #000000; }

.hero {
  display: none;
  width: 100%;
  height: 100%;
  background-color: #17232e;
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  position: relative;
}
.heroOverlay {
  position: absolute;
  left: 0; right: 0; top: 0; bottom: 0;
  background: rgba(0,0,0,0.22);
}
.heroContent {
  position: absolute;
  left: 5vw;
  right: 5vw;
  bottom: 5vh;
  z-index: 2;
}
.heroTitle {
  font-size: 7vh;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 2vh;
  color: #ffffff;
}
.heroTime {
  display: inline-block;
  font-size: 5vh;
  font-weight: 900;
  line-height: 1;
  color: #ffffff;
  background: rgba(0,0,0,0.34);
  border-radius: 2.5vh;
  padding: 2vh 3vw;
}
</style>
</head>
<body>
  <div id="page">
    <div id="normalView">
      <div id="bands"></div>
      <div id="header">
        <div id="title">HOPPETID</div>
        <div id="clock">00:00</div>
      </div>
    </div>

    <div id="miniHero" class="hero">
      <div class="heroOverlay"></div>
      <div class="heroContent">
        <div class="heroTitle">MINISPRETT PÅGÅR</div>
        <div class="heroTime" id="miniTime">00 min 00 sek</div>
      </div>
    </div>

    <div id="afterHero" class="hero">
      <div class="heroOverlay"></div>
      <div class="heroContent">
        <div class="heroTitle">AFTER DARK</div>
        <div class="heroTime" id="afterTime">00 min 00 sek</div>
      </div>
    </div>
  </div>

<script>
var weekdayPlan = [
  { out: "10:30", color: "pink", label: "ROSA" },
  { out: "11:00", color: "red", label: "RØD" },
  { out: "11:30", color: "silver", label: "SØLV" },
  { out: "12:00", color: "green", label: "GRØNN" },
  { out: "12:30", color: "orange", label: "ORANSJE" },
  { out: "13:00", color: "blue", label: "BLÅ" },
  { out: "13:30", color: "yellow", label: "GUL" },
  { out: "14:00", color: "purple", label: "MØRK LILLA" },
  { out: "14:30", color: "black", label: "SVART" },
  { out: "15:00", color: "white", label: "HVIT" },
  { out: "15:30", color: "pink", label: "ROSA" },
  { out: "16:00", color: "red", label: "RØD" },
  { out: "16:30", color: "silver", label: "SØLV" },
  { out: "17:00", color: "green", label: "GRØNN" },
  { out: "17:30", color: "orange", label: "ORANSJE" },
  { out: "18:00", color: "blue", label: "BLÅ" },
  { out: "18:30", color: "yellow", label: "GUL" },
  { out: "19:00", color: "purple", label: "MØRK LILLA" },
  { out: "19:30", color: "black", label: "SVART" },
  { out: "20:00", color: "white", label: "HVIT" }
];

var weekendPlan = [
  { out: "11:00", color: "mini", label: "MINISPRETT" },
  { out: "11:30", color: "silver", label: "SØLV" },
  { out: "12:00", color: "green", label: "GRØNN" },
  { out: "12:30", color: "orange", label: "ORANSJE" },
  { out: "13:00", color: "blue", label: "BLÅ" },
  { out: "13:30", color: "yellow", label: "GUL" },
  { out: "14:00", color: "purple", label: "MØRK LILLA" },
  { out: "14:30", color: "black", label: "SVART" },
  { out: "15:00", color: "white", label: "HVIT" },
  { out: "15:30", color: "pink", label: "ROSA" },
  { out: "16:00", color: "red", label: "RØD" },
  { out: "16:30", color: "silver", label: "SØLV" },
  { out: "17:00", color: "green", label: "GRØNN" },
  { out: "17:30", color: "orange", label: "ORANSJE" },
  { out: "18:00", color: "blue", label: "BLÅ" },
  { out: "18:30", color: "yellow", label: "GUL" },
  { out: "19:00", color: "purple", label: "MØRK LILLA" }
];

var afterDarkDates = {
  "2026-04-10": true,
  "2026-04-17": true,
  "2026-05-15": true,
  "2026-05-29": true,
  "2026-06-12": true
};

/* Gammel viste 5. Denne viser dobbelt: 10. */
var visibleBands = 10;

function pad(n) { return (n < 10 ? "0" : "") + n; }
function formatClock(d) { return pad(d.getHours()) + ":" + pad(d.getMinutes()); }
function dateKey(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }

function msAtToday(hhmm, now) {
  var parts = hhmm.split(":");
  var d = new Date(now.getTime());
  d.setHours(parseInt(parts[0], 10), parseInt(parts[1], 10), 0, 0);
  return d.getTime();
}

function formatRemaining(ms, withSeconds) {
  var total = Math.max(0, Math.floor(ms / 1000));
  var h = Math.floor(total / 3600);
  total = total - h * 3600;
  var m = Math.floor(total / 60);
  var s = total - m * 60;

  if (withSeconds) {
    if (h > 0) return h + " t " + m + " min " + s + " sek";
    return m + " min " + s + " sek";
  }
  if (h > 0) return h + " t " + m + " min";
  return m + " min";
}

function isWeekend(now) {
  var day = now.getDay();
  return day === 0 || day === 6;
}

function isMini(now) {
  if (!isWeekend(now)) return false;
  var start = msAtToday("09:30", now);
  var end = msAtToday("11:00", now);
  var t = now.getTime();
  return t >= start && t < end;
}

function isAfterDark(now) {
  if (!afterDarkDates[dateKey(now)]) return false;
  var start = msAtToday("20:00", now);
  var end = msAtToday("22:00", now);
  var t = now.getTime();
  return t >= start && t < end;
}

function currentPlan(now) {
  return isWeekend(now) ? weekendPlan : weekdayPlan;
}

function computeRows(now) {
  var plan = currentPlan(now);
  var nowMs = now.getTime();
  var firstFuture = -1;
  var i;

  for (i = 0; i < plan.length; i++) {
    if (msAtToday(plan[i].out, now) > nowMs) {
      firstFuture = i;
      break;
    }
  }
  if (firstFuture === -1) firstFuture = plan.length;

  var rows = [];

  /* Kun siste ferdige bånd. */
  if (firstFuture > 0) {
    var prev = plan[firstFuture - 1];
    rows.push({
      label: prev.label,
      color: prev.color,
      status: "done",
      remaining: 0
    });
  }

  for (i = firstFuture; i < plan.length && rows.length < visibleBands; i++) {
    rows.push({
      label: plan[i].label,
      color: plan[i].color,
      status: "active",
      remaining: msAtToday(plan[i].out, now) - nowMs
    });
  }

  while (rows.length < visibleBands && plan.length > 0) {
    rows.push({ label: "", color: "black", status: "empty", remaining: 0 });
  }

  /* Samme som gammel: ferdig nederst og kommende oppover. */
  rows.reverse();
  return rows;
}

function showNormal() {
  document.getElementById("normalView").style.display = "flex";
  document.getElementById("miniHero").style.display = "none";
  document.getElementById("afterHero").style.display = "none";
}
function showMini() {
  document.getElementById("normalView").style.display = "none";
  document.getElementById("miniHero").style.display = "block";
  document.getElementById("afterHero").style.display = "none";
}
function showAfter() {
  document.getElementById("normalView").style.display = "none";
  document.getElementById("miniHero").style.display = "none";
  document.getElementById("afterHero").style.display = "block";
}

function renderNormal(now) {
  showNormal();
  document.getElementById("clock").innerHTML = formatClock(now);

  var rows = computeRows(now).slice(0, visibleBands);
  var html = "";

  /* Nederste ikke-ferdige bånd får sekunder. Resten viser timer/minutter. */
  var lowestActiveIndex = -1;
  for (var j = rows.length - 1; j >= 0; j--) {
    if (rows[j].status === "active") {
      lowestActiveIndex = j;
      break;
    }
  }

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var timeText = "";
    var extraClass = "";

    if (r.status === "done") {
      timeText = "FERDIG";
      extraClass = " doneBand";
    } else if (r.status === "empty") {
      timeText = "";
      extraClass = " emptyBand";
    } else if (i === lowestActiveIndex) {
      timeText = formatRemaining(r.remaining, true);
      extraClass = " nextBand";
    } else {
      timeText = formatRemaining(r.remaining, false);
    }

    html += ''
      + '<div class="band ' + r.color + extraClass + '">'
      +   '<table class="bandTable">'
      +     '<tr>'
      +       '<td class="bandLeft"><div class="name">' + r.label + '</div></td>'
      +       '<td class="bandRight"><div class="time">' + timeText + '</div></td>'
      +     '</tr>'
      +   '</table>'
      + '</div>';
  }

  document.getElementById("bands").innerHTML = html;
}

function renderMini(now) {
  showMini();
  var left = msAtToday("11:00", now) - now.getTime();
  document.getElementById("miniTime").innerHTML = formatRemaining(left, true);
}

function renderAfter(now) {
  showAfter();
  var left = msAtToday("22:00", now) - now.getTime();
  document.getElementById("afterTime").innerHTML = formatRemaining(left, true);
}

function tick() {
  var now = new Date();

  document.getElementById("miniHero").style.backgroundImage = "url('minisprett.png')";
  document.getElementById("afterHero").style.backgroundImage = "url('afterdark.png')";

  if (isAfterDark(now)) {
    renderAfter(now);
  } else if (isMini(now)) {
    renderMini(now);
  } else {
    renderNormal(now);
  }
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
